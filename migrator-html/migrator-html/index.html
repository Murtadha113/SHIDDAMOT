<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نقل الفيديوهات — شدة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #EBF3FB; font-family: Tajawal, sans-serif; direction: rtl; color: #0D2A4A; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 40px; height: 40px; border: 4px solid #D8EAF8; border-top-color: #2B7DD4; border-radius: 50%; animation: spin 0.8s linear infinite; }
.center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; }
.top-bar { background: white; border-bottom: 1px solid #D8EAF8; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.top-bar h1 { font-size: 18px; font-weight: 900; }
.badges { display: flex; gap: 8px; }
.badge { padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }
.wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 120px; }
.card { background: white; border-radius: 18px; border: 1.5px solid #D8EAF8; padding: 20px; margin-bottom: 14px; }
.card.approved { border-color: #1D9E75; }
.card.rejected { border-color: #D85A30; }
.cat { display: inline-flex; gap: 4px; font-size: 12px; padding: 4px 12px; border-radius: 8px; background: #EBF3FB; color: #2B7DD4; margin-bottom: 12px; font-weight: 700; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.vlabel { font-size: 12px; color: #6B8AA8; font-weight: 700; margin-bottom: 6px; }
.thumb-wrap { position: relative; height: 110px; border-radius: 12px; overflow: hidden; cursor: pointer; background: #EBF3FB; }
.thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); font-size: 28px; color: white; opacity: 0; transition: opacity 0.15s; }
.thumb-wrap:hover .play { opacity: 1; }
.no-v { height: 110px; background: #F0F4F8; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #9BA8B8; font-size: 13px; }
.tbox { background: #F7FAFD; border-radius: 10px; padding: 10px 14px; }
.tbox-label { font-size: 11px; color: #9BA8B8; margin-bottom: 3px; }
.tbox-val { font-size: 14px; font-weight: 700; line-height: 1.5; }
.actions { display: flex; gap: 8px; border-top: 1px solid #E2EAF4; padding-top: 14px; margin-top: 4px; }
.btn-approve, .btn-reject { flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: Tajawal, sans-serif; transition: background 0.15s; }
.btn-approve { border: 2px solid #1D9E75; color: #0F6E56; background: transparent; }
.btn-approve.active { background: #E1F5EE; }
.btn-reject { border: 2px solid #D85A30; color: #993C1D; background: transparent; }
.btn-reject.active { background: #FAECE7; }
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #D8EAF8; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.migrate-btn { padding: 12px 32px; border-radius: 12px; border: 2px solid #1D9E75; background: #E1F5EE; color: #0F6E56; font-size: 15px; font-weight: 700; font-family: Tajawal, sans-serif; cursor: pointer; }
.migrate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.migrate-btn:hover:not(:disabled) { background: #9FE1CB; }
.log-box { background: white; border-radius: 16px; border: 1px solid #D8EAF8; padding: 20px; margin-top: 16px; }
.log-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; background: #F7FAFD; margin-bottom: 6px; font-size: 13px; }
.log-id { flex: 1; font-family: monospace; font-size: 12px; color: #3A6A9A; }
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: white; border-radius: 18px; padding: 16px; width: 90%; max-width: 580px; }
.modal video { width: 100%; border-radius: 12px; max-height: 380px; }
.modal-close { margin-top: 12px; width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #D8EAF8; background: transparent; font-family: Tajawal, sans-serif; font-size: 14px; color: #6B8AA8; cursor: pointer; }
.empty { text-align: center; padding: 80px 20px; color: #6B8AA8; font-size: 18px; font-weight: 700; }
.setup-box { background: white; border-radius: 20px; border: 1px solid #D8EAF8; padding: 32px; max-width: 420px; width: 90%; text-align: center; }
.setup-box h2 { font-size: 20px; font-weight: 900; margin-bottom: 8px; }
.setup-box p { font-size: 14px; color: #6B8AA8; margin-bottom: 24px; }
.num-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
.num-btn { padding: 10px 20px; border-radius: 10px; border: 2px solid #D8EAF8; background: transparent; font-size: 15px; font-weight: 700; cursor: pointer; font-family: Tajawal, sans-serif; color: #0D2A4A; transition: all 0.15s; }
.num-btn.selected { border-color: #2B7DD4; background: #EBF3FB; color: #2B7DD4; }
.load-btn { width: 100%; padding: 13px; border-radius: 12px; border: 2px solid #1D9E75; background: #E1F5EE; color: #0F6E56; font-size: 16px; font-weight: 700; font-family: Tajawal, sans-serif; cursor: pointer; }
.load-btn:hover { background: #9FE1CB; }
.more-btn { padding: 10px 24px; border-radius: 10px; border: 2px solid #D8EAF8; background: white; font-size: 14px; font-weight: 700; cursor: pointer; font-family: Tajawal, sans-serif; color: #3A6A9A; margin: 16px auto 0; display: block; }
.more-btn:hover { background: #EBF3FB; }
</style>
</head>
<body>

<div id="setup" class="center">
  <div class="setup-box">
    <div style="font-size:48px;margin-bottom:12px">🎬</div>
    <h2>نقل الفيديوهات</h2>
    <p>كم سؤال تبي تراجع الحين؟</p>
    <div class="num-btns">
      <button class="num-btn selected" id="btn-10" onclick="selectNum(10)">10</button>
      <button class="num-btn" id="btn-20" onclick="selectNum(20)">20</button>
      <button class="num-btn" id="btn-50" onclick="selectNum(50)">50</button>
      <button class="num-btn" id="btn-100" onclick="selectNum(100)">100</button>
    </div>
    <button class="load-btn" onclick="startLoad()">حمّل الأسئلة &larr;</button>
  </div>
</div>

<div id="loader" class="center" style="display:none">
  <div class="spinner"></div>
  <p style="color:#3A6A9A;font-size:16px">جاري التحميل...</p>
</div>

<div id="app" style="display:none">
  <div class="top-bar">
    <h1>🎬 نقل الفيديوهات — Cloudinary → Bunny CDN</h1>
    <div class="badges">
      <span class="badge" style="background:#E1F5EE;color:#0F6E56">✅ <span id="cnt-a">0</span></span>
      <span class="badge" style="background:#FEF3EA;color:#BA7517">⏳ <span id="cnt-p">0</span></span>
      <span class="badge" style="background:#FAECE7;color:#993C1D">❌ <span id="cnt-r">0</span></span>
    </div>
  </div>
  <div class="wrap">
    <div id="cards"></div>
    <button class="more-btn" id="more-btn" style="display:none" onclick="loadMore()">⬇ حمّل المزيد</button>
    <div id="log-box" class="log-box" style="display:none">
      <h2 style="font-size:16px;font-weight:800;margin-bottom:12px">📋 سجل النقل</h2>
      <div id="log-items"></div>
    </div>
  </div>
  <div class="bottom-bar">
    <span id="note" style="font-size:14px;color:#6B8AA8">راجع الأسئلة وأعطِ موافقتك</span>
    <button class="migrate-btn" id="migrate-btn" disabled onclick="startMigration()">🚀 ابدأ النقل</button>
  </div>
</div>

<div class="modal-bg" id="modal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <video id="modal-video" controls></video>
    <button class="modal-close" onclick="closeModal()">إغلاق</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyCdrP55RPDqVkcb8KX7X-Swt4wk23jcA2M",
  authDomain: "shidda.firebaseapp.com",
  databaseURL: "https://shidda-default-rtdb.firebaseio.com",
  projectId: "shidda",
  storageBucket: "shidda.firebasestorage.app",
  messagingSenderId: "80643661575",
  appId: "1:80643661575:web:c671a5432e65f42e49afa2",
  measurementId: "G-B5EP62PDEE"
};
var BUNNY = {
  zone:   "shidda-videos",
  key:    "9a72ba56-82d6-4119-b15f42d184fa-3adb-46c3",
  cdnUrl: "shidda-videos.b-cdn.net"
};
firebase.initializeApp(FIREBASE_CONFIG);
var db = firebase.firestore();

var allLoaded  = [];
var categories = {};
var decisions  = {};
var lastDoc    = null;
var batchSize  = 10;
var hasMore    = false;

function isCloud(url) { return url && (url.indexOf('cloudinary.com') !== -1); }
function thumb(url)   { return url.replace('/upload/', '/upload/w_320,h_200,c_fill,so_2/').replace(/\.[^.]+$/, '.jpg'); }

function selectNum(n) {
  batchSize = n;
  var btns = document.querySelectorAll('.num-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('selected');
  var el = document.getElementById('btn-' + n);
  if (el) el.classList.add('selected');
}

function startLoad() {
  document.getElementById('setup').style.display  = 'none';
  document.getElementById('loader').style.display = 'flex';
  db.collection('categories').get().then(function(cSnap) {
    cSnap.forEach(function(d) { categories[d.id] = d.data().name; });
    return fetchBatch();
  }).then(function() {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('app').style.display    = 'block';
    render();
  }).catch(function(e) {
    document.getElementById('loader').innerHTML = '<p style="color:#993C1D;font-size:16px;padding:20px">خطأ: ' + e.message + '</p>';
  });
}

function fetchBatch() {
  var q = db.collection('questions').where('type', '==', 'video').limit(batchSize * 3);
  if (lastDoc) q = q.startAfter(lastDoc);
  return q.get().then(function(snap) {
    var filtered = snap.docs.filter(function(d) {
      var data = d.data();
      return isCloud(data.mediaUrl) || (isCloud(data.answerMediaUrl) && data.answerMediaType === 'video');
    }).slice(0, batchSize);
    filtered.forEach(function(d) {
      var obj = d.data();
      obj.id = d.id;
      obj._ref = d;
      allLoaded.push(obj);
    });
    if (filtered.length > 0) lastDoc = filtered[filtered.length - 1];
    hasMore = snap.docs.length >= batchSize * 3;
  });
}

function loadMore() {
  document.getElementById('more-btn').textContent = '⏳ جاري التحميل...';
  fetchBatch().then(function() { render(); });
}

function render() {
  var c = document.getElementById('cards');
  if (allLoaded.length === 0) {
    c.innerHTML = '<div class="empty"><div style="font-size:56px">🎉</div><p>ما في فيديوهات على Cloudinary!</p></div>';
    document.getElementById('more-btn').style.display = 'none';
    return;
  }
  var html = '';
  for (var i = 0; i < allLoaded.length; i++) {
    var q = allLoaded[i];
    var hasQV = isCloud(q.mediaUrl);
    var hasAV = isCloud(q.answerMediaUrl) && q.answerMediaType === 'video';
    var dec = decisions[q.id] || 'pending';
    html += '<div class="card ' + (dec !== 'pending' ? dec : '') + '" id="card-' + q.id + '">';
    html += '<div class="cat">🏷️ ' + (categories[q.categoryId] || q.categoryId) + '</div>';
    html += '<div class="grid2">';
    html += '<div><div class="vlabel">🎬 فيديو السؤال</div>';
    html += hasQV ? '<div class="thumb-wrap" onclick="openVideo(\'' + q.mediaUrl + '\')"><img src="' + thumb(q.mediaUrl) + '" onerror="this.style.display=\'none\'"><div class="play">▶</div></div>' : '<div class="no-v">لا يوجد</div>';
    html += '</div>';
    html += '<div><div class="vlabel">✅ فيديو الجواب</div>';
   if (hasAV) {
  html += '<div class="thumb-wrap" onclick="openVideo(\'' + q.answerMediaUrl + '\')"><img src="' + thumb(q.answerMediaUrl) + '" onerror="this.style.display=\'none\'"><div class="play">▶</div></div>';
} else if (q.answerMediaType === 'image' && q.answerMediaUrl) {
  html += '<div class="thumb-wrap" style="cursor:default"><img src="' + q.answerMediaUrl + '" onerror="this.style.display=\'none\'"></div>';
} else {
  html += '<div class="no-v">لا يوجد</div>';
}
    html += '</div>';
    html += '</div>';
    html += '<div class="grid2">';
    html += '<div class="tbox"><div class="tbox-label">السؤال</div><div class="tbox-val">' + q.content + '</div></div>';
    html += '<div class="tbox"><div class="tbox-label">الجواب</div><div class="tbox-val">' + q.answer + '</div></div>';
    html += '</div>';
    html += '<div class="actions">';
    html += '<button class="btn-approve ' + (dec === 'approved' ? 'active' : '') + '" onclick="decide(\'' + q.id + '\',\'approved\')">✅ موافق — ينتقل الفيديوين</button>';
    html += '<button class="btn-reject ' + (dec === 'rejected' ? 'active' : '') + '" onclick="decide(\'' + q.id + '\',\'rejected\')">❌ تجاهل</button>';
    html += '</div>';
    html += '</div>';
  }
  c.innerHTML = html;
  document.getElementById('more-btn').style.display = hasMore ? 'block' : 'none';
  document.getElementById('more-btn').textContent = '⬇ حمّل المزيد';
  updateStats();
}

function decide(id, dec) {
  decisions[id] = dec;
  var card = document.getElementById('card-' + id);
  card.className = 'card ' + (dec !== 'pending' ? dec : '');
  card.querySelector('.btn-approve').className = 'btn-approve' + (dec === 'approved' ? ' active' : '');
  card.querySelector('.btn-reject').className  = 'btn-reject'  + (dec === 'rejected' ? ' active' : '');
  updateStats();
}

function updateStats() {
  var vals = Object.keys(decisions).map(function(k) { return decisions[k]; });
  var a = vals.filter(function(d) { return d === 'approved'; }).length;
  var r = vals.filter(function(d) { return d === 'rejected'; }).length;
  var p = allLoaded.length - a - r;
  document.getElementById('cnt-a').textContent = a;
  document.getElementById('cnt-r').textContent = r;
  document.getElementById('cnt-p').textContent = p;
  document.getElementById('migrate-btn').disabled = a === 0;
  document.getElementById('note').textContent = a > 0 ? (a + ' سؤال — ' + (a * 2) + ' فيديو جاهز') : 'راجع الأسئلة وأعطِ موافقتك';
}

function openVideo(url) {
  document.getElementById('modal-video').src = url;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-video').src = '';
}

function migrateFile(url) {
  return fetch(url).then(function(res) {
    if (!res.ok) throw new Error('فشل التنزيل');
    return res.blob();
  }).then(function(blob) {
    var parts = url.split('/');
    var raw = parts[parts.length - 1].split('?')[0];
    var ext = raw.split('.').pop() || 'mp4';
    var base = raw.replace(/\.[^.]+$/, '');
    var name = base + '_' + Date.now() + '.' + ext;
    return fetch('https://storage.bunnycdn.com/' + BUNNY.zone + '/videos/' + name, {
      method: 'PUT',
      headers: { AccessKey: BUNNY.key, 'Content-Type': 'application/octet-stream' },
      body: blob
    }).then(function(up) {
      if (!up.ok) throw new Error('فشل الرفع: ' + up.status);
      return BUNNY.cdnUrl + '/videos/' + name;
    });
  });
}

function startMigration() {
  var toMigrate = allLoaded.filter(function(q) { return decisions[q.id] === 'approved'; });
  document.getElementById('migrate-btn').disabled = true;
  document.getElementById('log-box').style.display = 'block';
  var logHtml = '';
  for (var j = 0; j < toMigrate.length; j++) {
    logHtml += '<div class="log-item" id="log-' + j + '"><span id="log-ico-' + j + '">⏳</span><span class="log-id">' + toMigrate[j].id.substring(0, 24) + '...</span><span id="log-status-' + j + '" style="font-weight:700;color:#6B8AA8">معلق</span></div>';
  }
  document.getElementById('log-items').innerHTML = logHtml;

  var i = 0;
  function next() {
    if (i >= toMigrate.length) {
      document.getElementById('migrate-btn').textContent = '✅ اكتمل النقل!';
      return;
    }
    var q = toMigrate[i];
    document.getElementById('log-ico-' + i).textContent = '🔄';
    document.getElementById('log-status-' + i).textContent = 'جاري...';
    var updates = {};
    var p = Promise.resolve();
    if (isCloud(q.mediaUrl)) {
      p = p.then(function() { return migrateFile(q.mediaUrl); }).then(function(url) { updates.mediaUrl = url; });
    }
    if (isCloud(q.answerMediaUrl) && q.answerMediaType === 'video') {
      p = p.then(function() { return migrateFile(q.answerMediaUrl); }).then(function(url) { updates.answerMediaUrl = url; });
    }
    p.then(function() {
      return db.collection('questions').doc(q.id).update(updates);
    }).then(function() {
      document.getElementById('log-ico-' + i).textContent = '✅';
      document.getElementById('log-status-' + i).textContent = 'تم';
      document.getElementById('log-status-' + i).style.color = '#0F6E56';
      i++; setTimeout(next, 200);
    }).catch(function(err) {
      document.getElementById('log-ico-' + i).textContent = '❌';
      document.getElementById('log-status-' + i).textContent = 'فشل: ' + err.message;
      document.getElementById('log-status-' + i).style.color = '#993C1D';
      i++; setTimeout(next, 200);
    });
  }
  next();
}
</script>
</body>
</html>
